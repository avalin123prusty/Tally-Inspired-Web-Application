<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tally-Inspired Accounting</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, Segoe UI, sans-serif;
      }
      body {
        margin: 0;
        background: #0f172a;
        color: #f8fafc;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        max-width: 720px;
        padding: 2rem;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.9);
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      }
      .pill {
        display: inline-block;
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        background: #22c55e;
        color: #052e16;
        font-weight: 700;
        margin-bottom: 1rem;
      }
      button {
        margin-top: 1rem;
        padding: 0.75rem 1rem;
        border: none;
        border-radius: 10px;
        background: #38bdf8;
        color: #082f49;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="pill">Day 1 • Day 2</div>
      <h1>Tally-Inspired Web Application</h1>
      <p>This project now has a working backend and a landing page. The plan continues with authentication, company management, dashboards, vouchers, reports, and deployment.</p>
      <button onclick="loadHealth()">Check API Status</button>
      <pre id="output">Waiting for response...</pre>
    </div>
    <script>
      async function loadHealth() {
        const output = document.getElementById('output');
        try {
          const response = await fetch('/api/health');
          const data = await response.json();
          output.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          output.textContent = error.message;
        }
      }
    </script>
  </body>
</html>
